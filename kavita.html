<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मेरी कविताएँ | GyanDeep</title>
    <style>
        body { background: #f0f2f5; padding: 20px; font-family: 'Arial', sans-serif; }
        .mangal-section { 
            background: #fdf6e3; padding: 25px; border-radius: 15px; 
            border: 2px solid #d4af37; color: #4a3728; 
            font-family: 'Georgia', serif; margin-bottom: 20px; 
        }
    </style>
</head>
<body>

    <div id="kavita-container">
        <p style="text-align: center;">कविताएँ लोड हो रही हैं...</p>
    </div>

    <script>
        fetch('data_kavita.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('kavita-container');
                container.innerHTML = ''; // लोडिंग टेक्स्ट हटा दें
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "mangal-section";
                    div.innerHTML = `
                        <h2 style="text-align: center; color: #8b0000; border-bottom: 2px solid #d4af37; padding-bottom: 10px;">${item.title}</h2>
                        <p style="text-align: center; font-weight: bold;">लेखक: ${item.author}</p>
                        <div style="white-space: pre-line; line-height: 1.8; margin-top: 20px;">
                            ${item.content}
                        </div>
                    `;
                    container.appendChild(div);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('kavita-container').innerHTML = "कविताएँ लोड करने में त्रुटि हुई।";
            });
    </script>
</body>
</html>
