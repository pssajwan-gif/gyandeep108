<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अनंत वैभव: अनन्या की लक्ष्मी-साधना</title>
    <style>
        body { font-family: 'Georgia', serif; padding: 20px; line-height: 1.8; color: #333; background-color: #fdfdfd; max-width: 800px; margin: auto; }
        .novel-container { margin-bottom: 60px; border-bottom: 2px solid #b8860b; padding-bottom: 40px; }
        .chapter-title { color: #800000; font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .chapter-subtitle { font-size: 22px; color: #555; font-style: italic; margin-bottom: 20px; }
        .content { font-size: 19px; text-align: justify; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="content-container"></div>

    <script>
        const novelData = [
            // अध्याय 1-16 (पूर्व में व्यवस्थित)
            { "chapter": "अध्याय 17", "title": "दादी माई की पाठशाला—आंतरिक मंथन और परंपरा का दर्शन", "content": `अनन्या के महाप्रयाण के पश्चात... [विस्तृत पाठ - अध्याय 17]` },
            { "chapter": "अध्याय 18", "title": "मणबसा और वैभव लक्ष्मी—स्थिर लक्ष्मी के दो पावन स्तंभ", "content": `अनन्या के चले जाने के बाद, राज्य में अब एक अलौकिक अनुशासन का युग था... [विस्तृत पाठ - अध्याय 18]` },
            { "chapter": "अध्याय 19", "title": "उद्यापन का महा-पर्व—सामूहिकता में लक्ष्मी का वास", "content": `मार्गशीर्ष का वह अंतिम गुरुवार आ पहुँचा था... [विस्तृत पाठ - अध्याय 19]` }
        ];

        let html = '';
        novelData.forEach(item => {
            html += `
                <div class="novel-container">
                    <h2 class="chapter-title">${item.chapter}</h2>
                    <h3 class="chapter-subtitle">${item.title}</h3>
                    <div class="content">${item.content}</div>
                </div>
            `;
        });
        document.getElementById('content-container').innerHTML = html;
    </script>
</body>
</html>
