<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अनंत वैभव: अनन्या की लक्ष्मी-साधना</title>
    <style>
        body { font-family: 'Georgia', serif; padding: 20px; line-height: 1.8; color: #333; background-color: #fdfdfd; max-width: 800px; margin: auto; }
        .novel-container { margin-bottom: 60px; border-bottom: 2px solid #b8860b; padding-bottom: 40px; }
        .chapter-title { color: #800000; font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .chapter-subtitle { font-size: 20px; color: #555; font-style: italic; margin-bottom: 20px; }
        .content { font-size: 19px; text-align: justify; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="content-container"></div>

    <script>
        const novelData = [
            { "chapter": "अध्याय 1", "title": "सृष्टि का आदि स्पंदन", "content": "ब्रह्मांड की उत्पत्ति के पूर्व न दिशाएं थीं, न काल का चक्र था, न ही प्रकाश का कोई अंश। सर्वत्र एक गहरा सन्नाटा था, जिसमें केवल 'श्री' का स्पंदन विद्यमान था। वही 'श्री' जो महालक्ष्मी हैं, वही जो दुर्गा हैं और वही जो संपूर्ण जगत की चैतन्य शक्ति हैं।" },
            { "chapter": "अध्याय 2", "title": "निष्ठा का दीप", "content": "हिमालय की शांत कंदराओं से दूर, श्रीया का जीवन अभावों और अनवरत 'ॐ श्रीं ह्रीं क्लीं' के जाप के साथ शुरू हुआ। वह प्रतिदिन सुबह उठकर गाँव के तालाब से जल भरती और अपनी छोटी सी कुटिया के द्वार पर दीपक जलाती थी। उसकी निष्ठा ही उसका एकमात्र संबल था।" },
            { "chapter": "अध्याय 3", "title": "वैभव की छाया और अलक्ष्मी का कोप", "content": "श्रीया की कुटिया में महालक्ष्मी का आगमन। अलक्ष्मी को परास्त कर लक्ष्मी ने शिक्षा दी कि वास्तविक धन संतोष है। अलक्ष्मी का अहंकार मिटा और लक्ष्मी ने श्रीया को प्रेम का धन दिया।" },
            { "chapter": "अध्याय 4", "title": "वैकुंठ की नीरवता और अभाव का आलिंगन", "content": "महालक्ष्मी के प्रस्थान के बाद भगवान जगन्नाथ ने स्वयं धरती पर आकर श्रीया की परीक्षा ली। अभावों को प्रभु का प्रसाद मानकर श्रीया ने अपनी भक्ति की पराकाष्ठा सिद्ध की।" },
            { "chapter": "अध्याय 5", "title": "पुनर्मिलन और महालक्ष्मी का विजय घोष", "content": "नारायण और लक्ष्मी जी ने श्रीया के घर को नया स्वरूप दिया। श्रीया ने धन के स्थान पर प्रभु का प्रेम चुना, जिससे महालक्ष्मी अत्यंत प्रसन्न हुईं।" },
            { "chapter": "अध्याय 6", "title": "अहं का विसर्जन और ज्ञान का उदय", "content": "श्रीया की कुटिया धर्म पीठ बनी। राजा का अहंकार श्रीया के ज्ञान के आगे भस्म हो गया। उसने अपना मुकुट श्रीया के चरणों में अर्पित कर दिया।" },
            { "chapter": "अध्याय 7", "title": "माया का अंतिम प्रहार और आत्म-बोध की अग्नि", "content": "अलक्ष्मी के छद्म को परास्त कर श्रीया ने सेवा को आंदोलन बनाया और अंत में वैकुंठ प्रस्थान का संकेत मिला। उसकी सेवा भावना ने समाज को एक नई दिशा दी।" },
            { "chapter": "अध्याय 8", "title": "मानवता का मंदिर—अंधकार से प्रकाश की ओर", "content": "श्रीया ने श्रम से 'मानवता का मंदिर' निर्मित किया। अंत में उसका शरीर दिव्य चेतना में विलीन हो गया, किंतु उसकी शिक्षाएं अमर हो गईं।" },
            { "chapter": "अध्याय 9", "title": "समय की धूल और स्मृति का पुनर्जागरण", "content": "अनन्या का जन्म हुआ और उसने पुनः श्रीया के 'सेवा धर्म' को जीवित किया। उसने समाज को सिखाया कि लक्ष्मी धन में नहीं, मन में बसती है।" },
            { "chapter": "अध्याय 10", "title": "मंथन का उद्घोष और सत्ता का विसर्जन", "content": "अनन्या ने 'मंथन' के रहस्य से राजा के अहंकार को ध्वस्त किया और सत्य का पुनरागमन हुआ। उसने सत्ता को जन-कल्याण का साधन बना दिया।" },
            { "chapter": "अध्याय 11", "title": "क्षीर-सागर का सत्य और प्रथम ऋचा का आह्वान", "content": "अनन्या ने हृदय के 'आंतरिक मंथन' के माध्यम से लक्ष्मी प्राप्ति का मार्ग प्रशस्त किया। उसने सिखाया कि लक्ष्मी प्राप्ति के लिए पहले भीतर के विकारों को पचाना आवश्यक है।" },
            { "chapter": "अध्याय 12", "title": "महासागर का मंथन और दशमहाविद्याओं का साक्षात्कार", "content": "दशमहाविद्याओं की ऊर्जा और 'श्री सूक्त' के पाठ से राज्य का कायाकल्प हुआ। राज्य अब भौतिक और आध्यात्मिक रूप से संपन्न होने लगा।" },
            { "chapter": "अध्याय 13", "title": "महाकाली का आह्वान और मोह-निद्रा का भंग", "content": "महाकाली की शक्ति से राजा का अहंकार भस्म हुआ और वह 'धर्म का सेवक' बना। मोह-निद्रा टूटी और राजा ने सत्य मार्ग को चुना।" },
            { "chapter": "अध्याय 14", "title": "महाकाल की वेदी और समय का अनुशासन", "content": "समय को 'महाकाल की वेदी' मानते हुए अनन्या ने राज्य में अनुशासन और उन्नति का युग स्थापित किया। समय का सम्मान करना ही लक्ष्मी का वास्तविक सम्मान है।" },
            { "chapter": "अध्याय 15", "title": "श्री सूक्त का दिव्य रहस्य और पूर्णता का महा-आरंभ", "content": "अनन्या का भौतिक विसर्जन और 'कृतज्ञता' के माध्यम से उसके अमर सत्य का उदय। उसने सिखाया कि परोपकार ही लक्ष्मी का वास्तविक निवास है।" },
            { "chapter": "अध्याय 16", "title": "रिक्तता से पूर्णता तक—अनन्या की विरासती चेतना", "content": "राज्य ने शोक को संकल्प में बदलकर अनन्या की शिक्षाओं को जीवनशैली का रूप दिया। अनन्या की स्मृति अब राज्य की हर धड़कन में बस गई।" },
            { "chapter": "अध्याय 17", "title": "दादी माई की पाठशाला—आंतरिक मंथन और परंपरा का दर्शन", "content": "दादी माई ने 'वैभव लक्ष्मी' और 'मणबसा गुरुवार' के व्रतों के पीछे के दार्शनिक महत्व को समझाया। ये व्रत केवल पूजा नहीं, बल्कि जीवन-विद्या हैं।" },
            { "chapter": "अध्याय 18", "title": "मणबसा और वैभव लक्ष्मी—स्थिर लक्ष्मी के दो पावन स्तंभ", "content": "वैभव लक्ष्मी और मणबसा गुरुवार के व्रतों को 'आत्म-अनुशासन' और 'अन्न-सम्मान' के जीवन-विद्या के रूप में स्थापित किया गया।" },
            { "chapter": "अध्याय 19", "title": "उद्यापन का महा-पर्व—सामूहिकता में लक्ष्मी का वास", "content": "सामूहिक उद्यापन के माध्यम से अनन्या के दर्शन को 'सेवा' और 'समर्पण' का रूप दिया गया। अब राज्य न केवल भौतिक संपन्न था, बल्कि करुणा का साम्राज्य बन गया था। अनन्या के शब्द—'मेरा जाना अंत नहीं, मेरा विस्तार है'—आज भी उस राज्य की हर सांस में गुंजायमान हैं। यह गाथा पूर्ण हुई, जहाँ 'अनंत वैभव' का अर्थ धन नहीं, अपितु 'कृतज्ञता और करुणा' है।" }
        ];

        let html = '';
        novelData.forEach(item => {
            html += `
                <div class="novel-container">
                    <h2 class="chapter-title">${item.chapter}</h2>
                    <h3 class="chapter-subtitle">${item.title}</h3>
                    <div class="content">${item.content}</div>
                </div>
            `;
        });
        document.getElementById('content-container').innerHTML = html;
    </script>
</body>
</html>
