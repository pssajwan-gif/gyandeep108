<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>अनंत वैभव की गाथा</title>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; }
        .chapter { margin-bottom: 40px; border-bottom: 1px solid #ccc; padding-bottom: 20px; }
        h1 { text-align: center; color: #d35400; }
        h2 { color: #2c3e50; }
    </style>
</head>
<body>

    <h1 id="book-title"></h1>
    <div id="chapters-container"></div>

    <script>
        // JSON फाइल को लोड करना
        fetch('kahani.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('book-title').innerText = data.book_title;
                const container = document.getElementById('chapters-container');
                
                data.chapters.forEach(chapter => {
                    const chapterDiv = document.createElement('div');
                    chapterDiv.className = 'chapter';
                    chapterDiv.innerHTML = `
                        <h2>अध्याय ${chapter.chapter_number}: ${chapter.title}</h2>
                        <p>${chapter.content}</p>
                    `;
                    container.appendChild(chapterDiv);
                });
            })
            .catch(error => console.error('Error loading JSON:', error));
    </script>
</body>
</html>
