<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अनंत वैभव: अनन्या की लक्ष्मी-साधना</title>
    <style>
        body { font-family: 'Georgia', serif; padding: 20px; line-height: 1.8; color: #333; background-color: #fdfdfd; max-width: 800px; margin: auto; }
        .novel-container { margin-bottom: 60px; border-bottom: 2px solid #b8860b; padding-bottom: 40px; }
        .chapter-title { color: #800000; font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .chapter-subtitle { font-size: 20px; color: #555; font-style: italic; margin-bottom: 20px; }
        .content { font-size: 18px; text-align: justify; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="content-container"></div>

    <script>
        // आपके द्वारा दिए गए 19 अध्यायों का विस्तृत पाठ
        const novelData = [
            { "chapter": "अध्याय 1", "title": "सृष्टि का आदि स्पंदन", "content": "यहाँ आपके द्वारा दिया गया अध्याय 1 का पूरा विस्तृत पाठ आएगा..." },
            { "chapter": "अध्याय 2", "title": "निष्ठा का दीप", "content": "यहाँ अध्याय 2 का पूरा विस्तृत पाठ..." },
            // ... इसी तरह 19 अध्यायों तक
        ];

        let html = '';
        novelData.forEach(item => {
            html += `
                <div class="novel-container">
                    <h2 class="chapter-title">${item.chapter}</h2>
                    <h3 class="chapter-subtitle">${item.title}</h3>
                    <div class="content">${item.content}</div>
                </div>
            `;
        });
        document.getElementById('content-container').innerHTML = html;
    </script>
</body>
</html>
