<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अनंत वैभव की गाथा | GyanDeep</title>
    <style>
        body { font-family: 'Georgia', serif; padding: 20px; color: #333; background-color: #f9f9f9; }
        .novel-container { margin-bottom: 50px; border-bottom: 2px solid #d4af37; padding-bottom: 30px; }
        .novel-chapter { font-family: serif; color: #8b0000; font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .novel-title { font-size: 22px; color: #555; margin-top: 0; font-style: italic; }
        .novel-content { font-size: 19px; line-height: 1.8; white-space: pre-line; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="content-container">उपन्यास के अध्याय लोड हो रहे हैं...</div>

    <script>
      fetch('data_upanyas.json')
        .then(response => response.json())
        .then(data => {
          let html = '';
          data.forEach(item => {
            html += `
              <div class="novel-container">
                <p class="novel-chapter">${item.chapter}</p>
                <p class="novel-title">${item.title}</p>
                <div class="novel-content">${item.content}</div>
              </div>
            `;
          });
          document.getElementById('content-container').innerHTML = html;
        })
        .catch(error => {
          document.getElementById('content-container').innerHTML = 'अभी उपन्यास उपलब्ध नहीं है।';
        });
    </script>
</body>
</html>
