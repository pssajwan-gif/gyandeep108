<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अनंत वैभव की गाथा | GyanDeep</title>
    <style>
        body { font-family: 'Georgia', serif; padding: 20px; color: #333; background-color: #f9f9f9; line-height: 1.8; }
        .novel-container { margin-bottom: 60px; border-bottom: 3px solid #d4af37; padding-bottom: 40px; }
        .novel-chapter { color: #8b0000; font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .novel-title { font-size: 24px; color: #555; margin-bottom: 20px; font-style: italic; }
        .novel-content { font-size: 20px; text-align: justify; color: #222; }
    </style>
</head>
<body>

    <div id="content-container"></div>

    <script>
      const novelData = [
        { "chapter": "अध्याय 1", "title": "सृष्टि का आदि स्पंदन", "content": "ब्रह्मांड की उत्पत्ति के पूर्व न दिशाएं थीं, न काल का चक्र था, न ही प्रकाश का कोई अंश। सर्वत्र एक गहरा सन्नाटा था, जिसमें केवल 'श्री' का स्पंदन विद्यमान था। वही 'श्री' जो महालक्ष्मी हैं, वही जो संपूर्ण जगत की चैतन्य शक्ति हैं। इसी आदि स्पंदन से सृष्टि के विस्तार की योजना बनी।" },
        { "chapter": "अध्याय 2", "title": "निष्ठा का दीप", "content": "हिमालय की शांत कंदराओं से दूर, एक ग्राम में श्रीया का जीवन अभावों और अनवरत 'ॐ श्रीं ह्रीं क्लीं' के जाप के साथ शुरू हुआ। वह प्रतिदिन सुबह उठकर तालाब से जल भरती और अपनी कुटिया के द्वार पर दीपक जलाती थी। उसकी निष्ठा ही उसका एकमात्र संबल था और यही निष्ठा लक्ष्मी को आकर्षित करने का प्रथम सोपान थी।" },
        { "chapter": "अध्याय 3", "title": "वैभव की छाया और अलक्ष्मी का कोप", "content": "श्रीया की कुटिया में महालक्ष्मी का आगमन हुआ। अलक्ष्मी ने बाधाएं उत्पन्न की, किंतु श्रीया ने उन्हें अपनी सात्विक ऊर्जा से परास्त कर दिया। लक्ष्मी ने उसे शिक्षा दी कि वास्तविक धन केवल स्वर्ण नहीं, अपितु संतोष और पवित्रता है।" },
        { "chapter": "अध्याय 4", "title": "वैकुंठ की नीरवता और अभाव का आलिंगन", "content": "महालक्ष्मी के प्रस्थान के बाद वैकुंठ में सन्नाटा था। भगवान जगन्नाथ ने स्वयं धरती पर आकर श्रीया की परीक्षा ली। श्रीया ने अभावों को भी प्रभु का प्रसाद समझकर स्वीकार किया, जिससे उसकी भक्ति और प्रगाढ़ हो गई।" },
        { "chapter": "अध्याय 5", "title": "पुनर्मिलन और महालक्ष्मी का विजय घोष", "content": "नारायण और लक्ष्मी जी ने श्रीया की कुटिया को वैभव से पूर्ण कर दिया। श्रीया ने धन के स्थान पर प्रभु के प्रेम को प्राथमिकता दी, जिससे महालक्ष्मी अत्यंत प्रसन्न हुईं और उन्होंने उसे स्थिर लक्ष्मी का वरदान दिया।" },
        { "chapter": "अध्याय 6", "title": "अहं का विसर्जन और ज्ञान का उदय", "content": "श्रीया की कुटिया धर्म पीठ बन गई। राजा का अहंकार श्रीया के सहज ज्ञान और त्याग के आगे भस्म हो गया। उसने अपना मुकुट उतारकर श्रीया के चरणों में समर्पित कर दिया।" },
        { "chapter": "अध्याय 7", "title": "माया का अंतिम प्रहार और आत्म-बोध की अग्नि", "content": "अलक्ष्मी ने छद्म रूप में राजा को भरमाया, किंतु श्रीया ने आत्म-बोध की अग्नि से उस माया को जलाकर राख कर दिया। श्रीया ने सेवा को एक सामाजिक आंदोलन का रूप दे दिया।" },
        { "chapter": "अध्याय 8", "title": "मानवता का मंदिर—अंधकार से प्रकाश की ओर", "content": "श्रीया ने श्रम से 'मानवता का मंदिर' निर्मित किया। अंत में, उसका भौतिक शरीर दिव्य चेतना में विलीन हो गया, किंतु उसकी शिक्षाएं अमर हो गईं।" },
        { "chapter": "अध्याय 9", "title": "समय की धूल और स्मृति का पुनर्जागरण", "content": "समय के साथ लोग श्रीया के उपदेशों को भूल गए। अनन्या का जन्म हुआ। उसने समाज की कुरीतियों के विरुद्ध खड़े होकर पुनः श्रीया के 'सेवा धर्म' को जागृत किया।" },
        { "chapter": "अध्याय 10", "title": "मंथन का उद्घोष और सत्ता का विसर्जन", "content": "अनन्या ने 'मंथन' के रहस्य का प्रयोग किया। उसने राजा के अहंकार और सत्ता के मद को ध्वस्त कर दिया। सत्य की विजय हुई और राज्य का पुनरुद्धार हुआ।" },
        { "chapter": "अध्याय 11", "title": "क्षीर-सागर का सत्य और प्रथम ऋचा का आह्वान", "content": "अनन्या ने हृदय के 'आंतरिक मंथन' के माध्यम से लक्ष्मी प्राप्ति का मार्ग प्रशस्त किया। उसने सिखाया कि लक्ष्मी केवल हृदय की निर्मलता में निवास करती हैं।" },
        { "chapter": "अध्याय 12", "title": "महासागर का मंथन और दशमहाविद्याओं का साक्षात्कार", "content": "दशमहाविद्याओं की ऊर्जा के आह्वान से राज्य का कायाकल्प हुआ। अज्ञान का अंधकार मिटा और राज्य प्रगति के पथ पर अग्रसर हुआ।" },
        { "chapter": "अध्याय 13", "title": "महाकाली का आह्वान और मोह-निद्रा का भंग", "content": "महाकाली की शक्ति से राजा का अहंकार भस्म हुआ। उसने स्वीकार किया कि वह मात्र 'धर्म का सेवक' है।" },
        { "chapter": "अध्याय 14", "title": "महाकाल की वेदी और समय का अनुशासन", "content": "अनन्या ने समय को 'महाकाल की वेदी' बताया। उसने राज्य में अनुशासन लागू किया, जिससे प्रत्येक कार्य समय पर होने लगा और उन्नति का युग आया।" },
        { "chapter": "अध्याय 15", "title": "श्री सूक्त का दिव्य रहस्य और पूर्णता का महा-आरंभ", "content": "अनन्या ने 'श्री सूक्त' की महिमा बताई। उसने सिखाया कि 'कृतज्ञता' ही वास्तविक धन है। अनन्या का भौतिक स्वरूप दिव्य प्रकाश में विलीन हुआ।" },
        { "chapter": "अध्याय 16", "title": "रिक्तता से पूर्णता तक—अनन्या की विरासती चेतना", "content": "राज्य ने शोक को संकल्प में बदलकर अनन्या की शिक्षाओं को अपनी जीवनशैली बना लिया। अनन्या के विचार राज्य के कण-कण में बस गए।" },
        { "chapter": "अध्याय 17", "title": "दादी माई की पाठशाला—आंतरिक मंथन और परंपरा का दर्शन", "content": "दादी माई ने 'वैभव लक्ष्मी' और 'मणबसा गुरुवार' के व्रतों के पीछे के दार्शनिक महत्व को समझाया। ये व्रत केवल पूजा नहीं, जीवन जीने की कला हैं।" },
        { "chapter": "अध्याय 18", "title": "मणबसा और वैभव लक्ष्मी—स्थिर लक्ष्मी के दो पावन स्तंभ", "content": "वैभव लक्ष्मी (आत्म-अनुशासन) और मणबसा (अन्न-सम्मान) को स्थिर लक्ष्मी के दो पावन स्तंभ माना गया, जिससे घर 'आश्रम' में परिवर्तित हो गए।" },
        { "chapter": "अध्याय 19", "title": "उद्यापन का महा-पर्व—सामूहिकता में लक्ष्मी का वास", "content": "सामूहिक उद्यापन से सेवा और समर्पण का भाव जागृत हुआ। यह गाथा पूर्ण हुई, जहाँ 'अनंत वैभव' का अर्थ धन नहीं, अपितु 'कृतज्ञता और करुणा' है। अनन्या के शब्द—'मेरा जाना अंत नहीं, मेरा विस्तार है'—आज भी गूंजते हैं।" }
      ];

      let html = '';
      novelData.forEach(item => {
        html += `
          <div class="novel-container">
            <h2 class="novel-chapter">${item.chapter}</h2>
            <p class="novel-title">${item.title}</p>
            <div class="novel-content">${item.content}</div>
          </div>
        `;
      });
      document.getElementById('content-container').innerHTML = html;
    </script>
</body>
</html>
