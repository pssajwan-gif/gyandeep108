<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GyanDeep AI</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; text-align: center; }
        .back-btn { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: #333; color: white; text-decoration: none; border-radius: 5px; }
        h1 { color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅️ वापस मुख्य मेनू</a>
    <h1>GyanDeep AI Assistant</h1>
    <p>यहाँ आप अपने प्रश्न पूछ सकते हैं।</p>

    <!-- Chatbase Embed Script यहाँ पेस्ट करें -->
    <script>
      window.embeddedChatbotConfig = {
        chatbotId: "YOUR_CHATBOT_ID", // यहाँ अपना असली Chatbot ID लिखें
        domain: "www.chatbase.co"
      }
    </script>
    <script
      src="https://www.chatbase.co/embed.min.js"
      chatbotId="YOUR_CHATBOT_ID" // यहाँ भी अपना Chatbot ID लिखें
      domain="www.chatbase.co"
      defer>
    </script>
    <!-- ऊपर दी गई स्क्रिप्ट को अपनी Chatbase ID से बदल दें -->

</body>
</html>
