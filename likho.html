<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Likho - GyanDeep</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px; min-height: 100vh;
        }
       .container { max-width: 700px; margin: 0 auto; }
       .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
       .back-btn {
            background: rgba(255,255,255,0.2); padding: 10px 15px;
            border-radius: 8px; text-decoration: none; color: white;
        }
        h1 { font-size: 26px; }
        input, select, textarea {
            width: 100%; padding: 15px; margin: 10px 0;
            border-radius: 8px; border: none; font-size: 16px;
            box-sizing: border-box; font-family: Arial;
        }
        textarea { min-height: 300px; resize: vertical; }
       .btn {
            padding: 15px; border: none; border-radius: 12px; width: 100%;
            font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
       .save-btn { background: #ff6b6b; color: white; }
       .ai-btn { background: #4CAF50; color: white; }
       .btn:disabled { background: #999; cursor: not-allowed; }
       .note {
            background: rgba(255,255,255,0.15); padding: 15px;
            border-radius: 8px; margin-top: 20px; font-size: 14px;
        }
       .success-box {
            background: rgba(0,255,0,0.2); padding: 15px;
            border-radius: 8px; margin-top: 15px; display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="upanyas.html" class="back-btn">← Back</a>
            <h1>✍️ Likho - Episode लिखो</h1>
        </div>

        <input type="text" id="title" placeholder="Upanyas ka Naam: Jaise 'कोड-लाल-स्याही'">
        <input type="text" id="chapter" placeholder="Episode Number: Jaise 'Ep 1' या सिर्फ '1'">
        <select id="bhasha">
            <option value="">Bhasha Chunein</option>
            <option value="Hindi">Hindi - हिंदी</option>
            <option value="Hinglish">Hinglish - हिंदी + English</option>
            <option value="Sanskrit">Sanskrit - संस्कृत</option>
            <option value="English">English</option>
            <option value="Bhojpuri">Bhojpuri - भोजपुरी</option>
            <option value="Pahadi">Pahadi - पहाड़ी</option>
        </select>
        <textarea id="content" placeholder="Yahan apna Chapter likho Bhumi..."></textarea>
        
        <button class="btn ai-btn" id="aiBtn" onclick="publishToAI()">🚀 GyanDeep108 AI में Publish करें</button>
        <button class="btn save-btn" onclick="saveChapter()">💾 JSON बनाओ + कॉपी करो</button>
        
        <div class="success-box" id="successBox">
            <b id="successMsg"></b><br>
            <textarea id="jsonOutput" style="width:100%;height:200px;font-family:monospace;display:none"></textarea>
        </div>

        <div class="note">
            <b>📝 Note:</b> "AI में Publish" दबाते ही ये Chapter सीधे GyanDeep108 AI के दिमाग में चला जाएगा। 5 मिनट बाद AI इससे सवालों के जवाब देने लगेगा।
        </div>
    </div>

    <script>
        // === ये 3 चीज़ें आपको AnyThingLLM से लेनी हैं ===
        const ANYTHING_LLM_URL = "https://your-app.onrender.com"; // Render वाला Link
        const API_KEY = "YOUR_API_KEY_HERE"; // Settings → API Keys से मिलेगा
        const WORKSPACE_SLUG = "gyandeep108"; // आपका Workspace नाम

        async function publishToAI() {
            const title = document.getElementById('title').value.trim();
            const chapter = document.getElementById('chapter').value.trim();
            const bhasha = document.getElementById('bhasha').value;
            const content = document.getElementById('content').value.trim();
            const aiBtn = document.getElementById('aiBtn');
            const successBox = document.getElementById('successBox');
            const successMsg = document.getElementById('successMsg');

            if (!title || !chapter || !content) {
                alert('Naam, Episode Number, aur Content teeno likho');
                return;
            }

            aiBtn.disabled = true;
            aiBtn.innerText = "⏳ AI में Upload हो रहा है...";
            successBox.style.display = 'block';
            successMsg.innerHTML = "GyanDeep108 AI को नया Chapter भेज रहे हैं...";

            // File का नाम और Content तैयार करो
            const fileName = `${title.replace(/ /g, '_')}_${chapter}.txt`;
            const fileContent = `Title: ${title}\nEpisode: ${chapter}\nBhasha: ${bhasha}\n\n${content}`;

            try {
                // AnyThingLLM API Call
                const response = await fetch(`${ANYTHING_LLM_URL}/api/v1/document/upload`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        workspaceSlug: WORKSPACE_SLUG,
                        fileName: fileName,
                        content: fileContent
                    })
                });

                if (response.ok) {
                    successMsg.innerHTML = `✅ हो गया! <b>${title} - ${chapter}</b> अब GyanDeep108 AI का हिस्सा है।<br>5 मिनट में AI इसे पढ़ लेगा।`;
                    // Form खाली कर दो
                    document.getElementById('title').value = '';
                    document.getElementById('chapter').value = '';
                    document.getElementById('content').value = '';
                } else {
                    successMsg.innerHTML = "❌ Error: AI में Upload नहीं हुआ। API Key या URL चेक करें।";
                }
            } catch (error) {
                successMsg.innerHTML = "❌ Error: Server से Connect नहीं हुआ। Net चेक करें।";
            }

            aiBtn.disabled = false;
            aiBtn.innerText = "🚀 GyanDeep108 AI में Publish करें";
        }

        function saveChapter() {
            const title = document.getElementById('title').value;
            const chapter = document.getElementById('chapter').value;
            const bhasha = document.getElementById('bhasha').value;
            const content = document.getElementById('content').value;
            
            const jsonData = {
                title: title,
                chapter: chapter,
                bhasha: bhasha,
                content: content,
                date: new Date().toISOString()
            };
            
            document.getElementById('jsonOutput').value = JSON.stringify(jsonData, null, 2);
            document.getElementById('jsonOutput').style.display = 'block';
            document.getElementById('successBox').style.display = 'block';
            document.getElementById('successMsg').innerHTML = "✅ JSON तैयार! नीचे से Copy कर लो";
        }
    </script>
</body>
</html>
