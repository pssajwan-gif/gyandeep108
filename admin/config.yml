---
backend:
  name: git-gateway
  branch: main
media_folder: assets/uploads
public_folder: /assets/uploads
collections:
  - name: upanyas
    label: 📚 Upanyas, Series & Kahaniya
    folder: _upanyas
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Cover Image
        name: thumbnail
        widget: image
        required: false
      - label: Body
        name: body
        widget: markdown
  - name: likho
    label: ✍️ Likho
    folder: _likho
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Body
        name: body
        widget: markdown
  - name: kavita
    label: 🪶 Kavita, Gazal, Sahitya
    folder: _kavita
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Kavita
        name: body
        widget: markdown
  - name: bhakti
    label: 🙏 Bhakti, Dharm, Dhyan
    folder: _bhakti
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Body
        name: body
        widget: markdown
  - name: suno
    label: 🎧 Suno
    folder: _suno
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Audio Link
        name: audio_url
        widget: string
      - label: Description
        name: body
        widget: markdown
  - name: gyan
    label: 🧠 Gyan, Vigyan, Samanya Gyan
    folder: _gyan
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Body
        name: body
        widget: markdown
  - name: margdarshan
    label: 🧭 Margdarshan, Motivational
    folder: _margdarshan
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Body
        name: body
        widget: markdown
  - name: bhasha
    label: 🌐 Bhasha, Gyan, Sikhsha
    folder: _bhasha
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Body
        name: body
        widget: markdown
