backend:
  name: github
  repo: pssajwan-gif/gyandeep108
  branch: main

media_folder: static/images/uploads
public_folder: /images/uploads

collections:
    - name: "chapter"
    label: "Chapter" 
    folder: "content/chapter"
    create: true
    slug: "{{slug}}"
    fields:
            - {label: "Title", name: "title", widget: "string"}
            - {label: "Body", name: "body", widget: "markdown"}
