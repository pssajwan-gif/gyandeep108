backend:
  name: git-gateway
  branch: main
media_folder: "images"
public_folder: "/images"
collections:
    - name: "upanyas"
    label: "महामाया के Chapters"
    folder: "chapters"
    create: true
    fields:
            - {label: "Upanyas Ka Naam", name: "title", widget: "string"}
            - {label: "Bhasha", name: "bhasha", widget: "select", options: ["Hindi", "Hinglish"]}
            - {label: "Chapter Number", name: "chapter", widget: "string"}
            - {label: "Chapter Likho", name: "body", widget: "markdown"}
