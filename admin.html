<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>GyanDeep Admin Panel</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; text-align: center; }
        #login-box, #admin-panel { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #admin-panel { display: none; text-align: left; }
        textarea { width: 100%; height: 150px; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; }
        button { padding: 15px; margin-top: 20px; background: #764ba2; color: white; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <!-- लॉगिन बॉक्स -->
    <div id="login-box">
        <h3>एडमिन लॉगिन</h3>
        <input type="password" id="password" placeholder="पासवर्ड डालें">
        <button onclick="checkPassword()">लॉगिन करें</button>
    </div>

    <!-- एडमिन पैनल -->
    <div id="admin-panel">
        <h2>नया अध्याय जोड़ें</h2>
        <input type="number" id="chNum" placeholder="अध्याय संख्या">
        <input type="text" id="chTitle" placeholder="अध्याय का शीर्षक">
        <textarea id="chContent" placeholder="कहानी यहाँ लिखें..."></textarea>
        <button onclick="generateJSON()">JSON कोड बनाएँ</button>
        <h3>कॉपी करने के लिए JSON कोड:</h3>
        <textarea id="output" readonly></textarea>
    </div>

    <script>
        function checkPassword() {
            const pass = document.getElementById('password').value;
            // यहाँ 'gyandeep123' को बदलकर अपना पसंदीदा पासवर्ड रख लें
            if(pass === "gyandeep123") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                alert("गलत पासवर्ड!");
            }
        }

        function generateJSON() {
            const chapter = {
                "chapter_number": parseInt(document.getElementById('chNum').value),
                "title": document.getElementById('chTitle').value,
                "content": document.getElementById('chContent').value
            };
            document.getElementById('output').value = JSON.stringify(chapter, null, 2);
        }
    </script>
</body>
</html>
