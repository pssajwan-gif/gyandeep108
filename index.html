<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GyanDeep - Padho, Suno, Likho</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; color: white; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 32px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 16px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 600px; 
            margin: 0 auto;
        }
        .card { 
            background: rgba(255,255,255,0.15); 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
        }
        .card:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
        .ai-card { 
            background: rgba(0, 0, 0, 0.4); 
            border: 2px solid #00d4ff; 
        }
        .icon { font-size: 40px; margin-bottom: 10px; }
        .footer { text-align: center; margin-top: 40px; opacity: 0.8; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🪔 GyanDeep</h1>
        <p>Padho, Suno, Likho - सब एक जगह</p>
    </div>

    <div class="grid">
        <div class="card" onclick="window.location.href='upanyas.html'">
            <div class="icon">📚</div>Upanyas
        </div>
        <div class="card" onclick="window.location.href='likho.html'">
            <div class="icon">✍️</div>Likho
        </div>
        <div class="card" onclick="window.location.href='kavita.html'">
            <div class="icon">🪶</div>Kavita
        </div>
        <div class="card" onclick="window.location.href='bhakti.html'">
            <div class="icon">🙏</div>Bhakti
        </div>
        <div class="card" onclick="window.location.href='suno.html'">
            <div class="icon">🎧</div>Suno
        </div>
        <div class="card" onclick="window.location.href='gyan.html'">
            <div class="icon">🧠</div>Gyan
        </div>
        <div class="card" onclick="window.location.href='margdarshan.html'">
            <div class="icon">🧭</div>Margdarshan
        </div>
        <div class="card" onclick="window.location.href='bhasha.html'">
            <div class="icon">🌐</div>Bhasha
        </div>
        <div class="card ai-card" onclick="window.location.href='ai-chat.html'">
            <div class="icon">🤖</div>GyanDeep AI
        </div>
    </div>

    <div class="footer">
        GyanDeep v2.2.0 | By Pankaj Singh Sajwan ❤️<br>
        "सभी कैटेगरीज अब सक्रिय हैं"
    </div>
</body>
</html>
