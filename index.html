<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GyanDeep - Padho, Suno, Likho</title>
    <style>
        :root { --accent: #764ba2; --text: white; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: var(--text); padding: 20px; transition: 0.3s; }

        #home-view { max-width: 600px; margin: 0 auto; text-align: center; }
        .logo { width: 100px; border-radius: 50%; margin-bottom: 10px; border: 3px solid white; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 30px; }
        .card { background: rgba(255,255,255,0.15); padding: 20px; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .card:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }

        #reader-view { display: none; max-width: 800px; margin: 0 auto; background: white; color: #333; padding: 20px; border-radius: 15px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; background: var(--accent); color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="home-view">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>🪔 GyanDeep</h1>
        <p>Padho, Suno, Likho</p>
        <div class="grid">
            <div class="card" onclick="openReader()">📚 उपन्यास</div>
            <div class="card" onclick="window.location.href='kavita.html'">🪶 Kavita</div>
            <div class="card" onclick="alert('Coming Soon')">✍️ Likho</div>
            <div class="card" onclick="alert('Coming Soon')">🙏 Bhakti</div>
            <div class="card" onclick="alert('Coming Soon')">🎧 Suno</div>
            <div class="card" onclick="alert('Coming Soon')">🧠 Gyan</div>
            <div class="card" onclick="alert('Coming Soon')">🧭 Margdarshan</div>
            <div class="card" onclick="alert('Coming Soon')">🌐 Bhasha</div>
            <div class="card" onclick="alert('<div class="card" onclick="window.location.href='ai-chat.html'">🤖 AI Chat</div>
')">🤖 AI Chat</div>
        </div>
    </div>

    <div id="reader-view">
        <div class="controls">
            <button onclick="closeReader()">🏠 होम</button>
            <button onclick="toggleDarkMode()">🌓 थीम</button>
            <a id="whatsapp-share" target="_blank" style="text-decoration:none;">
                <button style="background:#25D366;">WhatsApp पर शेयर करें</button>
            </a>
        </div>
        <div id="progress-bar" style="height:5px; background:var(--accent); width:0%;"></div>
        <h2 id="chapter-title" style="margin-top:15px;"></h2>
        <div id="chapter-content" style="margin-top:15px; font-size:18px; line-height:1.8;"></div>
        <div style="margin-top:20px;">
            <button onclick="changeChapter(-1)">पिछला</button>
            <button onclick="changeChapter(1)">अगला</button>
        </div>
    </div>

    <script>
        let currentChapter = 0;
        let bookData = null;

        fetch('kahani.json').then(r => r.json()).then(d => { bookData = d; });

        function openReader() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('reader-view').style.display = 'block';
            displayChapter();
        }

        function closeReader() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('reader-view').style.display = 'none';
        }

        function displayChapter() {
            if(!bookData) return;
            const ch = bookData.chapters[currentChapter];
            document.getElementById('chapter-title').innerText = `अध्याय ${ch.chapter_number}: ${ch.title}`;
            document.getElementById('chapter-content').innerText = ch.content;
            document.getElementById('progress-bar').style.width = ((currentChapter+1)/bookData.chapters.length)*100 + "%";
            
            // शेयर लिंक अपडेट करें
            const shareText = `GyanDeep पर पढ़ें: ${ch.title}`;
            document.getElementById('whatsapp-share').href = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
        }

        function changeChapter(step) {
            currentChapter = Math.max(0, Math.min(bookData.chapters.length - 1, currentChapter + step));
            displayChapter();
        }

        function toggleDarkMode() {
            const r = document.getElementById('reader-view');
            r.style.background = (r.style.background === 'rgb(45, 45, 45)') ? 'white' : '#2d2d2d';
            r.style.color = (r.style.color === 'white') ? '#333' : 'white';
        }
    </script>
</body>
</html>
